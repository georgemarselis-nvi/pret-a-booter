<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="520" fill="white"/>

<!-- Client -->
<rect x="40" y="220" width="110" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="95" y="247" text-anchor="middle" fill="#085041">Client</text>

<!-- slapd -->
<rect x="270" y="220" width="140" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="247" text-anchor="middle" fill="#26215C">slapd</text>

<!-- userPassword -->
<rect x="530" y="120" width="130" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="595" y="147" text-anchor="middle" fill="#042C53">userPassword</text>

<!-- Kerberos KDC -->
<rect x="530" y="220" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="595" y="247" text-anchor="middle" fill="#412402">Kerberos KDC</text>

<!-- saslauthd -->
<rect x="530" y="320" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="595" y="347" text-anchor="middle" fill="#4A1B0C">saslauthd</text>

<!-- TLS layer -->
<rect x="270" y="400" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="427" text-anchor="middle" fill="#2C2C2A">TLS layer</text>

<!-- Client -> slapd -->
<line x1="150" y1="242" x2="268" y2="242" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="209" y="232" text-anchor="middle" fill="#444">bind request</text>

<!-- slapd -> userPassword -->
<path d="M410 230 L480 230 L480 142 L528 142" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="492" y="172" text-anchor="middle" fill="#185FA5">PLAIN</text>
<text font-family="sans-serif" font-size="12" x="492" y="186" text-anchor="middle" fill="#185FA5">SCRAM</text>

<!-- slapd -> Kerberos KDC -->
<line x1="410" y1="242" x2="528" y2="242" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="469" y="232" text-anchor="middle" fill="#BA7517">GSSAPI</text>

<!-- slapd -> saslauthd -->
<path d="M410 255 L480 255 L480 342 L528 342" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="492" y="292" text-anchor="middle" fill="#993C1D">DIGEST-MD5</text>
<text font-family="sans-serif" font-size="12" x="492" y="306" text-anchor="middle" fill="#993C1D">CRAM-MD5</text>
<text font-family="sans-serif" font-size="12" x="492" y="320" text-anchor="middle" fill="#993C1D">NTLM, {SASL}</text>

<!-- slapd -> TLS layer -->
<line x1="340" y1="264" x2="340" y2="398" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="358" y="340" fill="#5F5E5A">EXTERNAL</text>

<!-- Legend -->
<text font-family="sans-serif" font-size="11" x="40" y="490" fill="#888">PLAIN / SCRAM: slapd reads userPassword directly</text>
<text font-family="sans-serif" font-size="11" x="40" y="506" fill="#888">GSSAPI: ticket verified against keytab, KDC not contacted at bind time</text>
</svg>
