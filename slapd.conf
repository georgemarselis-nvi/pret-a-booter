##########
# Basics #
##########

# core.schema: mandatory. Defines objectClass, cn, dn, top. Nothing works without it.
include         /etc/ldap/schema/core.schema
# cosine.schema: COSINE project (1980s). Adds mail, l, o, ou, telephoneNumber.
# https://www.rfc-editor.org/rfc/rfc4524.html
include         /etc/ldap/schema/cosine.schema
# inetorgperson.schema: defines inetOrgPerson object class. Adds uid, givenName, sn, displayName.
include         /etc/ldap/schema/inetorgperson.schema

# pidfile and argsfile are managed by systemd via PIDFile= in the service unit
# do not set them here or slapd will conflict with systemd's pid tracking
# pidfile /var/run/slapd/slapd.pid
# argsfile /var/run/slapd/slapd.args

# loglevel none  # use in production
loglevel        any

modulepath      /usr/lib/ldap
moduleload      back_mdb

##########################
# Database Configuration #
##########################

# database mdb creates /var/lib/ldap/data.mdb and /var/lib/ldap/lock.mdb
database        mdb
suffix          "dc=marsel,dc=is"
rootdn          "cn=admin,dc=marsel,dc=is"
# Generated with: slappasswd -s 12345
rootpw          {SSHA}mlNdcAZ3XlPsIWTQoMZjbARljPjWm9H6
directory       /var/lib/ldap
index           objectClass,cn eq

########
# ACLs #
########

access to attrs=userPassword
        by anonymous auth
        by self write
        by * none

access to *
        by self write
        by * none

##########################
# Monitor Database       #
##########################

# Uncomment to enable LDAP-queryable slapd statistics
# Requires: moduleload back_monitor
# Query with: ldapsearch -x -b cn=Monitor
#
# database monitor
# access to dn.subtree="cn=Monitor"
#         by dn.exact="cn=admin,dc=marsel,dc=is" read
#         by * none
