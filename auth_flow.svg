<svg width="780" height="500" viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="a0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="780" height="500" fill="white"/>

<!--
  Client:      x=20..130  cy=250
  slapd:       x=200..310 cy=250
  slapd right edge x=310, vertical spine at x=400
  userPassword: x=560..710 cy=80
  Kerberos KDC: x=560..710 cy=250
  saslauthd:    x=560..710 cy=420
  TLS layer:    x=200..310 cy=400
-->

<!-- Lines -->
<!-- Client -> slapd -->
<line x1="130" y1="250" x2="228" y2="250" stroke="#444" stroke-width="1.2" marker-end="url(#a0)"/>

<!-- slapd right -> vertical spine at x=400 -->
<line x1="340" y1="250" x2="400" y2="250" stroke="#888" stroke-width="1"/>

<!-- spine -> userPassword: up from x=400,y=250 to x=400,y=80, then right -->
<path d="M400 250 L400 80 L558 80" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ab)"/>

<!-- spine -> Kerberos KDC: straight right -->
<line x1="400" y1="250" x2="558" y2="250" stroke="#BA7517" stroke-width="1.2" marker-end="url(#aa)"/>

<!-- spine -> saslauthd: down from x=400,y=250 to x=400,y=420, then right -->
<path d="M400 250 L400 420 L558 420" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#ac)"/>

<!-- slapd -> TLS layer: down -->
<line x1="285" y1="272" x2="285" y2="378" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#ag)"/>

<!-- Boxes -->
<rect x="20" y="228" width="110" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="75" y="255" text-anchor="middle" fill="#085041">Client</text>

<rect x="230" y="228" width="110" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="285" y="255" text-anchor="middle" fill="#26215C">slapd</text>

<rect x="560" y="58" width="150" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="635" y="85" text-anchor="middle" fill="#042C53">userPassword</text>

<rect x="560" y="228" width="150" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="635" y="255" text-anchor="middle" fill="#412402">Kerberos KDC</text>

<rect x="560" y="398" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="635" y="425" text-anchor="middle" fill="#4A1B0C">saslauthd</text>

<rect x="230" y="380" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="285" y="407" text-anchor="middle" fill="#2C2C2A">TLS layer</text>

<!-- Labels on horizontal segments, white backing -->
<!-- bind request: midpoint x=165, y=250 -->
<rect x="145" y="242" width="68" height="13" fill="white"/>
<text font-family="sans-serif" font-size="11" x="179" y="252" text-anchor="middle" fill="#444">bind request</text>

<!-- PLAIN/SCRAM: stacked, on horizontal segment x=400..558, y=80 -->
<rect x="450" y="62" width="48" height="26" fill="white"/>
<text font-family="sans-serif" font-size="11" x="474" y="73" text-anchor="middle" fill="#185FA5">PLAIN</text>
<text font-family="sans-serif" font-size="11" x="474" y="86" text-anchor="middle" fill="#185FA5">SCRAM</text>

<!-- GSSAPI: on horizontal segment x=400..558, y=250 -->
<rect x="450" y="242" width="48" height="13" fill="white"/>
<text font-family="sans-serif" font-size="11" x="474" y="252" text-anchor="middle" fill="#BA7517">GSSAPI</text>

<!-- DIGEST: stacked, on horizontal segment x=400..558, y=420 -->
<rect x="435" y="400" width="88" height="52" fill="white"/>
<text font-family="sans-serif" font-size="11" x="479" y="412" text-anchor="middle" fill="#993C1D">DIGEST-MD5</text>
<text font-family="sans-serif" font-size="11" x="479" y="425" text-anchor="middle" fill="#993C1D">CRAM-MD5</text>
<text font-family="sans-serif" font-size="11" x="479" y="438" text-anchor="middle" fill="#993C1D">NTLM</text>
<text font-family="sans-serif" font-size="11" x="479" y="451" text-anchor="middle" fill="#993C1D">{SASL}</text>

<!-- EXTERNAL: right of vertical line -->
<rect x="292" y="318" width="62" height="13" fill="white"/>
<text font-family="sans-serif" font-size="11" x="295" y="328" fill="#5F5E5A">EXTERNAL</text>

<!-- Legend -->
<text font-family="sans-serif" font-size="10" x="20" y="466" fill="#888">PLAIN / SCRAM: slapd reads userPassword directly, no Cyrus SASL involvement</text>
<text font-family="sans-serif" font-size="10" x="20" y="480" fill="#888">GSSAPI: keytab on slapd host; KDC not contacted at bind time</text>
</svg>
