# Version: 0.5
# Host: bigend.marsel.is

# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 10.0.0.4
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 10.0.0.138
d-i netcfg/get_nameservers string 10.0.0.138
d-i netcfg/confirm_static boolean true
d-i netcfg/get_hostname string bigend
d-i netcfg/get_domain string marsel.is

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Oslo
d-i clock-setup/ntp boolean true

# Partitioning
d-i partman-auto/disk string /dev/vda
d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string \
    custom ::                          \
        512 512 512 fat32              \
            $primary{ }               \
            method{ efi }             \
            format{ }                 \
        .                              \
        1024 1024 1024 xfs             \
            $primary{ }               \
            method{ format }          \
            format{ }                 \
            use_filesystem{ }         \
            filesystem{ xfs }         \
            mountpoint{ /boot }       \
        .                              \
        4096 4096 4096 linux-swap      \
            method{ swap }            \
            format{ }                 \
        .                              \
        10000 20000 -1 xfs             \
            method{ format }          \
            format{ }                 \
            use_filesystem{ }         \
            filesystem{ xfs }         \
            mountpoint{ / }           \
        .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean false

# Root
d-i passwd/root-login boolean false

# User
d-i passwd/user-fullname string gmarselis
d-i passwd/username string gmarselis
d-i passwd/user-password-crypted password !
d-i passwd/user-default-groups string sudo

# Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string vim openssh-server nginx dnsmasq tftpd-hpa xauth shim-signed grub-efi-amd64-signed
d-i pkgsel/upgrade select full-upgrade

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/vda
d-i grub-installer/with_other_os boolean false

# Finish
d-i finish-install/reboot_in_progress note

# Post-install
d-i preseed/late_command string \
    in-target bash -c 'echo bigend.marsel.is > /etc/hostname'; \
    in-target mkdir -p /home/gmarselis/.ssh; \
    in-target bash -c 'echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL5G39vHZAQFo6BuFfJtIFUR/4DyQtf9KIIy4jJlcBQt gmarselis@molly.vetinst.no" > /home/gmarselis/.ssh/authorized_keys'; \
    in-target chown -R gmarselis:gmarselis /home/gmarselis/.ssh; \
    in-target chmod 700 /home/gmarselis/.ssh; \
    in-target chmod 600 /home/gmarselis/.ssh/authorized_keys; \
    in-target bash -c 'echo "gmarselis ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/gmarselis'; \
    in-target chmod 440 /etc/sudoers.d/gmarselis; \
    in-target sed -i 's/GRUB_CMDLINE_LINUX=""/GRUB_CMDLINE_LINUX="console=ttyS0,115200n8"/' /etc/default/grub; \
    in-target update-grub; \
    in-target systemctl enable nginx; \
    in-target systemctl enable dnsmasq; \
    in-target systemctl enable tftpd-hpa
