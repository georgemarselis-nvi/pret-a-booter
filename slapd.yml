---
- name: Deploy slapd configuration
  hosts: ldap
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    # --------------------------------------------------------------
    # 1. Confirm the remote host is actually reachable and slapd is
    #    in a known state before we start mutating its config.
    # --------------------------------------------------------------
    - name: Check remote host is reachable
      ansible.builtin.ping:
    - name: Check current slapd service state
      ansible.builtin.systemd:
        name: slapd
      register: slapd_pre_state
      become: true
    - name: Attempt to start slapd if not already running
      ansible.builtin.systemd:
        name: slapd
        state: started
      become: true
      when: slapd_pre_state.status.ActiveState != "active"
      register: slapd_pre_start
      failed_when: false
    - name: Fail if slapd cannot be started before deployment
      ansible.builtin.fail:
        msg: "slapd is not running on {{ inventory_hostname }} and could not be started, refusing to deploy on top of a broken service"
      when: >
        slapd_pre_state.status.ActiveState != "active" and
        (slapd_pre_start is failed or slapd_pre_start.status.ActiveState != "active")

    # --------------------------------------------------------------
    # 2. Provision database directories slapd will not create itself.
    #    slapd fails at startup (mdb_db_open) if a database directory
    #    is missing. The accesslog backend (suffix cn=log) lives in
    #    its own directory alongside the main DB.
    # --------------------------------------------------------------
    - name: Create accesslog database directory
      ansible.builtin.file:
        path: /var/lib/ldap/accesslog
        state: directory
        owner: openldap
        group: openldap
        mode: '0750'
      become: true

    - name: Backup slapd.conf
      ansible.builtin.copy:
        src: /etc/ldap/slapd.conf
        dest: /etc/ldap/slapd.conf.orig
        owner: root
        group: openldap
        mode: '0640'
        remote_src: true
      become: true
    - name: Deploy slapd.conf
      ansible.builtin.copy:
        src: slapd.conf
        dest: /etc/ldap/slapd.conf
        owner: root
        group: openldap
        mode: '0640'
      become: true
      notify: Restart slapd
    - name: Validate slapd.conf
      ansible.builtin.command: /usr/sbin/slaptest -v -f /etc/ldap/slapd.conf
      register: slaptest
      changed_when: false
      failed_when: false
      become: true
    - name: Rollback slapd.conf on validation failure
      ansible.builtin.copy:
        src: /etc/ldap/slapd.conf.orig
        dest: /etc/ldap/slapd.conf
        owner: root
        group: openldap
        mode: '0640'
        remote_src: true
      become: true
      when: slaptest.rc != 0
    - name: Fail if slapd.conf validation failed
      ansible.builtin.fail:
        msg: "slapd.conf validation failed, rolled back to previous version"
      when: slaptest.rc != 0
    - name: Backup ldap.conf
      ansible.builtin.copy:
        src: /etc/ldap/ldap.conf
        dest: /etc/ldap/ldap.conf.orig
        owner: root
        group: root
        mode: '0644'
        remote_src: true
      become: true
    - name: Deploy ldap.conf
      ansible.builtin.copy:
        src: ldap.conf
        dest: /etc/ldap/ldap.conf
        owner: root
        group: root
        mode: '0644'
      become: true

    # --------------------------------------------------------------
    # 3. Force the handler to fire here so the TLS check below runs
    #    against the actually-restarted service.
    # --------------------------------------------------------------
    - name: Flush handlers to apply restart before TLS check
      ansible.builtin.meta: flush_handlers

    - name: Confirm slapd is active after restart
      ansible.builtin.systemd:
        name: slapd
      register: slapd_post_state
      become: true
    - name: Fail if slapd is not active after deployment
      ansible.builtin.fail:
        msg: "slapd is not active on {{ inventory_hostname }} after config deployment"
      when: slapd_post_state.status.ActiveState != "active"

    # --------------------------------------------------------------
    # 4. GnuTLS handshake check against port 636.
    #    gnutls-utils must already be installed on the control node.
    #    gnutls-cli prints its handshake summary to stderr, not
    #    stdout, when run non-interactively -- rc is the only
    #    reliable signal here.
    # --------------------------------------------------------------
    - name: Verify TLS 1.3 handshake on port 636
      ansible.builtin.command: >
        gnutls-cli --port 636
        --priority "SECURE128:+VERS-TLS1.3"
        --logfile /dev/null
        {{ inventory_hostname }}
      args:
        stdin: ""
      delegate_to: localhost
      register: tls_check
      changed_when: false
      failed_when: tls_check.rc != 0

  handlers:
    - name: Restart slapd
      ansible.builtin.systemd:
        name: slapd
        state: restarted
      become: true
