##########
# Basics #
##########
# core.schema: mandatory. Defines objectClass, cn, dn, top. Nothing works without it.
include         /etc/ldap/schema/core.schema
# cosine.schema: COSINE project (1980s). Adds mail, l, o, ou, telephoneNumber.
# RFC 4524: https://www.rfc-editor.org/rfc/rfc4524.html
include         /etc/ldap/schema/cosine.schema
# inetorgperson.schema: defines inetOrgPerson object class. Adds uid, givenName, sn, displayName.
include         /etc/ldap/schema/inetorgperson.schema
# pidfile and argsfile are managed by systemd via PIDFile= in the service unit
# do not set them here or slapd will conflict with systemd's pid tracking
# pidfile /run/slapd/slapd.pid
# argsfile /run/slapd/slapd.args
# Disable anonymous bind; anonymous users should not be able to query the DIT
# Two-step anonymous search then rebind is a security leak and a design flaw
disallow bind_anon
# disallow bind_simple: reject simple (password) binds entirely.
# Forces all authentication through SASL. Only enable once SASL
# is fully configured and tested -- this locks out ldappasswd and
# any tool that does not speak SASL.
# disallow bind_simple
# # require authc: reject all unauthenticated access even after bind.
# disallow bind_anon blocks anonymous binds; require authc blocks anonymous
# access via other paths (e.g. operations without a prior bind).
require authc
# loglevel none  # use in production
loglevel        any
##########################
# SASL                   #
##########################
# sasl-realm: default realm slapd assumes when a client does not supply one.
# The SASL username plus this realm form the authentication identity that
# authz-regexp then maps to a DN. A client can override with -U user@realm.
# Match this to the Kerberos realm once GSSAPI is wired in (MARSEL.IS).
# LDAP v4 note: realm is mandatory and bound to the storage authority --
# no default-realm guessing, no cross-realm deref during auth.
sasl-realm      marsel.is
#######
# TLS #
#######
# Certificates issued by Let's Encrypt via certbot DNS-01 (Cloudflare)
# fullchain.pem includes the cert and the Let's Encrypt intermediate CA chain
TLSCACertificateFile    /etc/letsencrypt/live/ldap.marsel.is/fullchain.pem
TLSCertificateFile      /etc/letsencrypt/live/ldap.marsel.is/fullchain.pem
TLSCertificateKeyFile   /etc/letsencrypt/live/ldap.marsel.is/privkey.pem
# Require TLS for all non-local connections
# TLSVerifyClient never: clients do not need to present a cert (yet)
TLSVerifyClient         never
#TLSVerifyClient         demand
#############################
# TLS hardening (max settings)
#############################
# TLSProtocolMin: floor on negotiated protocol version. 3.4 = TLS 1.3 only.
# Disables TLS 1.0/1.1/1.2 entirely -- no downgrade negotiation possible.
# Format is <major>.<minor> mapped to SSL/TLS version, not literal "1.3" string:
#   3.1=TLS1.0  3.2=TLS1.1  3.3=TLS1.2  3.4=TLS1.3
# Ignored under GnuTLS -- only applies to the OpenSSL TLS backend.
TLSProtocolMin          3.4
# TLSCipherSuite: explicit allow-list, strongest-only.
# This is OpenSSL cipher string syntax, evaluated by the OpenSSL build slapd
# was linked against -- verify with: openssl ciphers -v 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256'
TLSCipherSuite          TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256
# TLSECName: names the curve used for ECDHE key exchange. Required under
# OpenSSL to explicitly enable ECDHE -- without it, ECDHE suites in
# TLSCipherSuite above may not actually negotiate ECDHE even though the
# suite string includes GCM/ChaCha20 ciphers. Ignored under GnuTLS and NSS,
# where curve selection lives in the ciphersuite spec itself.
TLSECName               prime256v1
# TLSCRLCheck: validate client certs against a CRL.
# "all" checks the entire chain, not just the leaf. Currently moot since
# TLSVerifyClient is "never" above -- no client certs are being checked at all.
TLSCRLCheck             all
# TLSCRLFile: the actual CRL file TLSCRLCheck reads against. Left unset --
# TLSCRLCheck has nothing to check without this, so as configured it is a
# no-op alongside TLSVerifyClient never. Wire in a real CRL file (or move to
# OCSP, which slapd.conf has no native directive for) once client certs are
# actually being verified.
#TLSCRLFile             /etc/ldap/crl.pem
# TLSRandFile: source of random bits when /dev/[u]random is unavailable.
# Irrelevant on Linux -- /dev/urandom is always present. This exists for
# legacy Unix/embedded targets using an EGD/PRNGD socket. Left unset.
# TLSDHParamFile: DH parameters for DHE cipher suites.
# Required only for DSA certs or RSA certs missing "key encipherment" key
# usage -- not our case (standard RSA cert from Let's Encrypt). Left
# deliberately unset: setting it can also silently enable Anonymous
# Diffie-Hellman (ADH) cipher suites unless "!ADH" is explicitly appended
# to TLSCipherSuite, so it is safer unset than half-configured.
############################
# Security Strength Factor #
############################
# security directive enforces minimum SSF globally (placed before any database block).
# SSF is a numeric representation of connection security strength:
#   0   = no security (cleartext)
#   56  = DES-equivalent (obsolete)
#   112 = 3DES-equivalent (obsolete)
#   128 = AES-128
#   256 = AES-256 / TLS 1.3 with AES-256-GCM (what we enforce)
#
# sub-options (all set to 256 = max):
#   ssf=N         minimum SSF for the overall connection (transport + auth combined)
#   tls=N         minimum SSF contributed by the TLS layer specifically
#   sasl=N        minimum SSF contributed by the SASL layer specifically
#   update_ssf=N  minimum overall SSF required to perform any write operation
#   update_tls=N  minimum TLS SSF required for write operations
#   update_sasl=N minimum SASL SSF required for write operations
#   simple_bind=N minimum overall SSF required before simple bind is permitted
#
# Note: simple bind SSF is always 0 (password sent in the clear at the LDAP layer,
# even if TLS encrypts it at the transport layer). Setting simple_bind=256 means
# the TLS layer must have SSF>=256 before slapd will even accept a simple bind attempt.
# This is the correct setting: enforce TLS first, then allow simple bind over it.
#
# LDAP v4 note: this entire directive is over-engineered. One connection, one SSF,
# max available, enforced globally. No per-layer, per-operation granularity needed.
security ssf=256 tls=256 sasl=256 update_ssf=256 update_tls=256 update_sasl=256 simple_bind=256 transport=256
modulepath      /usr/lib/ldap
# back_mdb is compiled in statically on Debian -- moduleload is redundant
# but kept here for explicitness and portability to distros where it is a module
# produces "null module registered" log noise on Debian; harmless
moduleload      back_mdb
##########################
# Config Database        #
##########################
# back-config is loaded internally by slapd even when using slapd.conf (not OLC)
# Without an explicit ACL slapd warns and falls back to hardcoded root-only default
# We make that explicit here: admin write, everyone else denied
database        config
access to *
        by dn.exact="cn=admin,dc=marsel,dc=is" write
        by * none
##########################
# Monitor Database       #
##########################
# Enables cn=Monitor -- operational statistics, connection counts, backend info
# rootdn required to suppress ACL scope warning
# Access restricted to admin only
database        monitor
rootdn          "cn=admin,dc=marsel,dc=is"
access to dn.subtree="cn=Monitor"
        by dn.exact="cn=admin,dc=marsel,dc=is" read
        by * none
##########################
# Database Configuration #
##########################
# database mdb creates /var/lib/ldap/data.mdb and /var/lib/ldap/lock.mdb
database        mdb
suffix          "dc=marsel,dc=is"
# The next two lines assign a record for the directory manager and give
# the manager entry a password; essentially a break-glass account
#   old OpenLDAP : cn=Manager,dc=example,dc=com
#   Debian       : cn=admin,dc=marsel,dc=is * we pick this one cuz manager sucks and "administrator" is just windowsy
#   Windows AD   : cn=Administrator,cn=Users,dc=marsel,dc=is
rootdn          "cn=admin,dc=marsel,dc=is"
# Generated with: slappasswd -s 12345
rootpw          {SSHA}mlNdcAZ3XlPsIWTQoMZjbARljPjWm9H6
directory       /var/lib/ldap
# MDB stores indexes inside data.mdb -- not separate files like hdb/bdb
# slapindex is not needed after slapadd -- indexes rebuild automatically on load
# slapindex is only needed if index directives change on an already-populated DB
index           objectClass,cn eq
########
# ACLs #
########
# userPassword, userSMIMECertificate, userPKCS12: sensitive attributes
# anonymous auth allowed for bind only; self write; rootdn bypasses ACLs entirely
access to dn.subtree="dc=marsel,dc=is" attrs=userPassword,userSMIMECertificate,userPKCS12
        by anonymous auth
        by * none
# All other attributes under dc=marsel,dc=is: self write, deny all others
access to dn.subtree="dc=marsel,dc=is"
        by self write
        by * none
##########################
# Example/Test Database  #
##########################
