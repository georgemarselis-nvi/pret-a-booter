####################
# LDAP Client Settings #
####################
URI     ldaps://ldap.marsel.is ldapi:///
BASE    dc=marsel,dc=is
BINDDN  cn=admin,dc=marsel,dc=is
SIZELIMIT  0
TIMELIMIT  0

####################
# TLS Settings     #
####################

# TLS_CACERT: path to the CA certificate (or chain) used to verify the server's certificate.
# Use fullchain.pem when the server cert is signed by an intermediate CA (e.g. Let's Encrypt).
# Options: any valid PEM file path.
TLS_CACERT       /etc/letsencrypt/live/ldap.marsel.is/fullchain.pem

# TLS_REQCERT: how strictly to verify the server certificate.
# Options:
#   never  - do not verify (dangerous, MITM risk)
#   allow  - verify if cert present, proceed anyway on failure
#   try    - verify if cert present, proceed anyway on failure
#   demand - verify and abort if verification fails (correct setting for production)
#   hard   - same as demand
TLS_REQCERT      demand

# TLS_REQSAN: whether to require a Subject Alternative Name match against the server hostname.
# Options:
#   never  - do not check SAN
#   allow  - check SAN if present, proceed anyway on failure
#   demand - require SAN and abort if it does not match (correct setting for production)
TLS_REQSAN       demand

# TLS_PROTOCOL_MIN: minimum TLS protocol version to accept.
# Options: 3.1 (TLS 1.0), 3.2 (TLS 1.1), 3.3 (TLS 1.2), 3.4 (TLS 1.3)
# 3.4 enforces TLS 1.3 only, matching TLSProtocolMin on the server.
TLS_PROTOCOL_MIN 3.4

# TLS_CIPHER_SUITE: OpenSSL cipher string controlling which ciphers are offered.
# Options: any valid OpenSSL cipher string.
# HIGH: only high-strength ciphers; !aNULL: exclude anonymous (no auth); !eNULL: exclude null encryption.
# Note: TLS 1.3 ciphersuites are not controlled by this directive; they are negotiated separately.
TLS_CIPHER_SUITE HIGH:!aNULL:!eNULL:@STRENGTH

# TLS_CRLCHECK: whether to check Certificate Revocation Lists.
# Options:
#   none - no CRL checking (acceptable until internal CA is running)
#   peer - check CRL for the server certificate only
#   all  - check CRL for the entire chain
# Flip to peer or all once step-ca is issuing CRLs.
TLS_CRLCHECK     none
