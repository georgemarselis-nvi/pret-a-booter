const BOX_W = 250;
const HEADER_H = 44;
const ROW_H = 15;
const SEP_H = 8;
const TOTAL_W = 1480;

const KIND_COLOR = {"STRUCTURAL": "#1a4a7a", "AUXILIARY": "#5a1a7a", "ABSTRACT": "#1a5a2a"};
const TITLE_H = 70;
const MARGIN = 60;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let tx = 0, ty = 0, scale = 1;

function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}

function fitAll() {
  const pw = wrap.clientWidth, ph = wrap.clientHeight - 10;
  scale = Math.min(pw / TOTAL_W, ph / TOTAL_H) * 0.95;
  tx = (pw - TOTAL_W * scale) / 2;
  ty = 10;
  draw();
}

function resetView() {
  scale = 1; tx = 0; ty = 0; draw();
}

function zoom(factor) {
  const cx = wrap.clientWidth / 2, cy = wrap.clientHeight / 2;
  tx = cx - (cx - tx) * factor;
  ty = cy - (cy - ty) * factor;
  scale *= factor;
  draw();
}

function drawArrow(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.bezierCurveTo(mx, y1, mx, y2, x2, y2);
  ctx.stroke();
  // arrowhead
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.save();
  ctx.translate(x2, y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-10, -4);
  ctx.lineTo(-10, 4);
  ctx.closePath();
  ctx.fillStyle = '#888';
  ctx.fill();
  ctx.restore();
}

function drawBox(node) {
  const { x, y, h, name, kind, schema, oid, must, may, key } = node;
  const cx = x + BOX_W / 2;
  const highlighted = highlightedNodes.size === 0 || highlightedNodes.has(key);
  const alpha = highlighted ? 1.0 : 0.15;

  ctx.globalAlpha = alpha;
  
  // Box shadow
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = highlighted ? 8 : 2;

  // Main box
  ctx.fillStyle = 'white';
  ctx.strokeStyle = highlighted ? '#444' : '#888';
  ctx.lineWidth = highlighted ? 1.5 : 0.8;
  roundRect(x, y, BOX_W, h, 3);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Header
  const kc = KIND_COLOR[kind] || '#444';
  ctx.fillStyle = kc;
  roundRect(x, y, BOX_W, HEADER_H, 3);
  ctx.fill();
  ctx.fillRect(x, y + HEADER_H - 6, BOX_W, 6);

  // Header text
  ctx.fillStyle = 'white';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(name, cx, y + 16);
  ctx.font = '9px monospace';
  ctx.fillStyle = '#cdf';
  ctx.fillText(kind, cx, y + 28);
  ctx.font = '8px monospace';
  ctx.fillStyle = '#9ac';
  ctx.fillText(schema + ' · ' + oid, cx, y + 39);

  // MUST attrs
  let ry = y + HEADER_H + 6;
  ctx.textAlign = 'left';
  if (must.length) {
    for (const m of must) {
      ctx.font = (m.inherited ? 'normal' : 'bold') + ' 9px monospace';
      ctx.fillStyle = m.inherited ? '#bb4400' : '#880000';
      ctx.fillText('■ ' + m.attr, x + 5, ry + 11);
      if (m.inherited) {
        ctx.font = '7px monospace';
        ctx.fillStyle = '#999';
        ctx.textAlign = 'right';
        ctx.fillText('↑' + m.src, x + BOX_W - 3, ry + 11);
        ctx.textAlign = 'left';
      }
      ry += ROW_H;
    }
  } else {
    ctx.font = 'italic 8px monospace';
    ctx.fillStyle = '#bbb';
    ctx.fillText('(no MUST)', x + 5, ry + 11);
    ry += ROW_H;

  ry += 4;
  ctx.setLineDash([5, 3]);
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, ry);
  ctx.lineTo(x + BOX_W, ry);
  ctx.stroke();
  ctx.setLineDash([]);
  ry += SEP_H;

  // MAY attrs
  if (may.length) {
    for (const m of may) {
      ctx.font = '9px monospace';
      ctx.fillStyle = m.inherited ? '#666' : '#111';
      ctx.textAlign = 'left';
      ctx.fillText('○ ' + m.attr, x + 5, ry + 11);
      if (m.inherited) {
        ctx.font = '7px monospace';
        ctx.fillStyle = '#bbb';
        ctx.textAlign = 'right';
        ctx.fillText('↑' + m.src, x + BOX_W - 3, ry + 11);
        ctx.textAlign = 'left';
      }
      ry += ROW_H;
    }
  } else {
    ctx.font = 'italic 8px monospace';
    ctx.fillStyle = '#bbb';
    ctx.fillText('(no MAY)', x + 5, ry + 11);
  }

  ctx.globalAlpha = 1.0;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(0, 0, TOTAL_W, TOTAL_H);

  // Title bar
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, TOTAL_W, TITLE_H);
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#4af';
  ctx.textAlign = 'left';
  ctx.fillText('OpenLDAP Default Schema — Complete Inheritance Hierarchy', MARGIN, 28);
  ctx.font = '11px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(NODES.length + ' objectClasses · all MUST/MAY shown · inherited attrs marked ↑parent · parsed from slapd 2.6.x · left→right by depth', MARGIN, 45);

  // Legend
  let lx = MARGIN, ly = 52;
  for (const [kind, col] of Object.entries(KIND_COLOR)) {
    ctx.fillStyle = col;
    ctx.fillRect(lx, ly, 10, 10);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#ddd';
    ctx.fillText(kind, lx + 13, ly + 10);
    lx += 120;
  }
  ctx.font = '10px monospace';
  ctx.fillStyle = '#f88'; ctx.fillText('■ MUST', lx + 5, ly + 10);
  ctx.fillStyle = '#ddd'; ctx.fillText('○ MAY', lx + 65, ly + 10);
  ctx.fillStyle = '#aaa'; ctx.fillText('↑inherited from parent', lx + 115, ly + 10);

  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([7, 4]);
  for (const e of EDGES) {
    drawArrow(e.x1, e.y1, e.x2, e.y2);
  }
  ctx.setLineDash([]);

  // Boxes
  for (const node of NODES) {
    drawBox(node);
  }

  ctx.restore();
}

  const mx = e.clientX, my = e.clientY - 36;
  tx = mx - (mx - tx) * f;
  ty = my - (my - ty) * f;
  scale *= f;
  draw();
}, { passive: false });

// Tooltip + hover
wrap.addEventListener('mousemove', e => {
  if (dragging) return;
  const wx = (e.clientX - tx) / scale;
  const wy = (e.clientY - 36 - ty) / scale;
  let found = null;
  for (const node of NODES) {
    if (wx >= node.x && wx <= node.x + BOX_W && wy >= node.y && wy <= node.y + node.h) {
      found = node; break;
    }
  }
  if (found) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY + 12) + 'px';
    tooltip.innerHTML = '<b>' + found.name + '</b><br>' + found.kind + ' · ' + found.schema + '<br>OID: ' + found.oid + '<br>MUST: ' + found.must.length + ' · MAY: ' + found.may.length;
  } else {
    tooltip.style.display = 'none';
  }
});
wrap.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// Search
function doSearch(term) {
  searchTerm = term.trim().toLowerCase();
  if (!searchTerm) {
    highlightedNodes.clear();
  } else {
    highlightedNodes.clear();
    for (const node of NODES) {
      if (node.name.toLowerCase().includes(searchTerm) ||
          node.must.some(m => m.attr.toLowerCase().includes(searchTerm)) ||
          node.may.some(m => m.attr.toLowerCase().includes(searchTerm))) {
        highlightedNodes.add(node.key);
      }
    }
  }
  draw();
}

window.addEventListener('resize', resize);
resize();
fitAll();
</script>
</body>
