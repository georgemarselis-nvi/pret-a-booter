---
- name: Deploy slapd configuration
  hosts: ldap
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Deploy slapd.conf
      ansible.builtin.copy:
        src: slapd.conf
        dest: /etc/ldap/slapd.conf
        owner: root
        group: openldap
        mode: '0640'
      notify: Restart slapd

  handlers:
    - name: Restart slapd
      ansible.builtin.systemd:
        name: slapd
        state: restarted
