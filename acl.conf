##############################################
# ACLs
# marsel.is directory
# included from slapd.conf AFTER the database directive:
#   include /etc/ldap/acl.conf
##############################################
##
## Restrict by IP address: localhost + LAN only, else drop
access to *
        by peername.ip=127.0.0.1 none break
        by peername.ip=10.0.0.0%255.255.255.0 none break

## Give LDAP Admins immediate write access
## NOTE: your admin group is groupOfNames/member, not
## groupOfUniqueNames/uniqueMember. Adjust if you switch schema.
access to dn.subtree="dc=marsel,dc=is"
        by group/groupOfNames/member="cn=LDAP Admins,ou=groups,dc=marsel,dc=is" write
        by * none break

## userPassword: anonymous auth, self write, else nothing
access to attrs=userPassword
        by anonymous auth
        by self write

## uid: needed by authz-regexp (LDAP-URL filter runs as anonymous)
## uid is in the DN, so users cannot change their own uid
access to attrs=uid
        by anonymous read
        by users read

## Do not let anyone modify ou / employeeNumber / employeeType
access to attrs=ou,employeeNumber,employeeType
        by users read

## Service account: can authenticate, reads nothing else. Also stops anonymous.
access to *
        by dn.exact="uid=authenticate,ou=services,dc=marsel,dc=is" none
        by users none break

## Prevent ou=users from seeing service accounts
access to dn.subtree="ou=services,dc=marsel,dc=is"
        by dn.subtree="ou=users,dc=marsel,dc=is" none
        by users read

## Allow a user to add subentries beneath its own record
access to dn.regex="^.*,uid=([^,]+),ou=users,dc=marsel,dc=is$"
        by dn.exact,expand="uid=$1,ou=users,dc=marsel,dc=is" write

## Default: modify own record, read others
access to *
        by self write
        by users read
